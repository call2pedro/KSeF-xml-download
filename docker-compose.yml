services:
  ksef-xml-download:
    build: .
    container_name: ksef-xml-download
    image: ksef-xml-download:latest
    restart: unless-stopped
    environment:
      - TZ=Europe/Warsaw
      - KSEF_CRON=${KSEF_CRON:-0 * * * *}
    volumes:
      - ${KSEF_DATA_DIR:-./data}:/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M
      - /var/run:size=1M
      - /var/spool/cron:size=1M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
